name: Supabase Keep-Alive

# Se ejecuta todos los días a las 8:00 AM UTC (2:00 AM CST México)
# También se puede ejecutar manualmente desde GitHub
on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch: # Permite ejecución manual

jobs:
  ping-supabase:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase Database
        env:
          POSTGRES_DB_URI: ${{ secrets.POSTGRES_DB_URI }}
        run: |
          echo "🔄 Ejecutando keep-alive ping a Supabase..."
          echo "📅 Fecha: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          
          # Instalar cliente PostgreSQL
          sudo apt-get update -qq && sudo apt-get install -yqq postgresql-client > /dev/null 2>&1
          
          # Ejecutar ping con transacciones de base de datos reales para registrar actividad
          # Esto crea una tabla de control si no existe e inserta el registro del ping actual.
          SQL_QUERY="
            CREATE TABLE IF NOT EXISTS public._keep_alive (
              id SERIAL PRIMARY KEY,
              last_ping TIMESTAMP WITH TIME ZONE DEFAULT CURRENT_TIMESTAMP
            );
            INSERT INTO public._keep_alive (last_ping) VALUES (CURRENT_TIMESTAMP);
            DELETE FROM public._keep_alive WHERE last_ping < NOW() - INTERVAL '30 days';
            SELECT count(*) FROM public._keep_alive;
          "
          
          if psql "$POSTGRES_DB_URI" -c "$SQL_QUERY" --no-psqlrc -t -A 2>/dev/null; then
            echo "✅ Keep-alive exitoso - Actividad registrada en Supabase"
          else
            echo "❌ Error al conectar o escribir en Supabase"
            exit 1
          fi
